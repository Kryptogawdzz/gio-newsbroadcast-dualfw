<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Broadcast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BREAKING NEWS INTRO -->
    <div class="breaking-intro hidden" id="breakingIntro">
        <div class="breaking-bg"></div>
        <div class="breaking-content">
            <span class="breaking-text" id="breaking-text">BREAKING NEWS</span>
            <div class="breaking-line"></div>
        </div>
    </div>

    <!-- PROFESSIONAL TICKER -->
    <div class="ticker" id="ticker">
        <div class="ticker-label" id="ticker-label">
            <span class="label-top"><span class="live-dot"></span>LIVE</span>
            <span class="label-main" id="header-text">NEWS</span>
        </div>
        <div class="ticker-content">
            <div class="ticker-track" id="track"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
